<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="100%" height="100%">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FFF4E6" />
    </radialGradient>
  </defs>
  <rect width="300" height="200" rx="16" fill="url(#bg)" />
  <!-- Striped bucket -->
  <g transform="translate(100, 90)">
    <path d="M10 0 L20 85 L80 85 L90 0 Z" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" />
    <path d="M10 0 L20 85 L35 85 L30 0 Z" fill="#E50914" />
    <path d="M42 0 L45 85 L55 85 L52 0 Z" fill="#E50914" />
    <path d="M65 0 L68 85 L80 85 L75 0 Z" fill="#E50914" />
    <!-- Yellow top band -->
    <path d="M8 -2 L10 12 L90 12 L92 -2 Z" fill="#FFC72C" />
  </g>
  <!-- Overflowing Fried Chicken Pieces -->
  <g transform="translate(90, 40)">
    <!-- Legs and wings -->
    <path d="M10 45 C10 25 35 15 50 35 L60 55 L30 65 Z" fill="#D97706" transform="rotate(-30, 30, 45)" />
    <path d="M80 45 C80 25 105 15 120 35 L130 55 L100 65 Z" fill="#D97706" transform="rotate(30, 110, 45)" />
    <!-- Center leg -->
    <path d="M40 30 C40 10 75 5 95 20 C115 35 110 55 90 60 Z" fill="#C25E00" />
    <circle cx="65" cy="25" r="3" fill="#92400E" />
    <circle cx="80" cy="20" r="3" fill="#92400E" />
  </g>
</svg>