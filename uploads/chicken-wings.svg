<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="100%" height="100%">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FFF4E6" />
    </radialGradient>
  </defs>
  <rect width="300" height="200" rx="16" fill="url(#bg)" />
  <ellipse cx="150" cy="140" rx="90" ry="20" fill="#E5E7EB" />
  <ellipse cx="150" cy="138" rx="84" ry="16" fill="#F3F4F6" />
  <!-- Two Crispy Wings -->
  <g transform="translate(70, 50)">
    <!-- Wing 1 (Back) -->
    <g transform="translate(15, -5) rotate(-15)">
      <path d="M10 40 C10 20 40 10 65 25 C90 40 100 70 80 80 C60 90 30 80 10 40 Z" fill="#C25E00" />
      <path d="M45 40 C55 35 65 45 75 40" stroke="#92400E" stroke-width="4" stroke-linecap="round" fill="none" />
    </g>
    <!-- Wing 2 (Front) -->
    <g transform="translate(45, 15) rotate(15)">
      <path d="M10 40 C10 20 40 10 65 25 C90 40 100 70 80 80 C60 90 30 80 10 40 Z" fill="#D97706" />
      <path d="M35 45 C45 40 55 50 65 45" stroke="#B45309" stroke-width="4" stroke-linecap="round" fill="none" />
      <path d="M25 60 C35 55 45 65 55 60" stroke="#B45309" stroke-width="4" stroke-linecap="round" fill="none" />
    </g>
  </g>
</svg>