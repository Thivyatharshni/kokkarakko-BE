<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="100%" height="100%">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FFF4E6" />
    </radialGradient>
  </defs>
  <rect width="300" height="200" rx="16" fill="url(#bg)" />
  <ellipse cx="150" cy="145" rx="90" ry="20" fill="#E5E7EB" />
  <ellipse cx="150" cy="143" rx="84" ry="16" fill="#F3F4F6" />
  <!-- Two Lollipops -->
  <g transform="translate(60, 45)">
    <!-- Lollipop 1 (pointing left-up) -->
    <g transform="translate(20, 20) rotate(-35)">
      <path d="M100 25 L130 25" stroke="#F9FAFB" stroke-width="10" stroke-linecap="round" />
      <circle cx="130" cy="25" r="7" fill="#F9FAFB" />
      <circle cx="65" cy="25" r="28" fill="#C25E00" />
      <circle cx="65" cy="25" r="24" fill="#D97706" />
    </g>
    <!-- Lollipop 2 (pointing right-up) -->
    <g transform="translate(80, 15) rotate(35)">
      <path d="M0 25 L-30 25" stroke="#F9FAFB" stroke-width="10" stroke-linecap="round" />
      <circle cx="-30" cy="25" r="7" fill="#F9FAFB" />
      <circle cx="35" cy="25" r="30" fill="#B91C1C" /> <!-- Red spicy glaze -->
      <circle cx="35" cy="25" r="26" fill="#DC2626" />
      <ellipse cx="30" cy="20" rx="10" ry="4" fill="#FCA5A5" opacity="0.6" />
    </g>
  </g>
</svg>