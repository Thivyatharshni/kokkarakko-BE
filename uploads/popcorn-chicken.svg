<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="100%" height="100%">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FFF4E6" />
    </radialGradient>
  </defs>
  <rect width="300" height="200" rx="16" fill="url(#bg)" />
  <!-- Red-White striped cup -->
  <g transform="translate(110, 80)">
    <path d="M10 0 L15 80 L65 80 L70 0 Z" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" />
    <!-- Red stripes -->
    <path d="M10 0 L15 80 L25 80 L22 0 Z" fill="#E50914" />
    <path d="M34 0 L35 80 L45 80 L44 0 Z" fill="#E50914" />
    <path d="M56 0 L55 80 L65 80 L58 0 Z" fill="#E50914" />
  </g>
  <!-- Popcorn Chicken Pieces heap -->
  <g transform="translate(100, 30)">
    <!-- Back row -->
    <circle cx="25" cy="45" r="14" fill="#C25E00" />
    <circle cx="50" cy="38" r="16" fill="#C25E00" />
    <circle cx="75" cy="45" r="15" fill="#C25E00" />
    <!-- Front row -->
    <circle cx="15" cy="55" r="15" fill="#D97706" />
    <circle cx="38" cy="48" r="18" fill="#D97706" />
    <circle cx="62" cy="48" r="17" fill="#D97706" />
    <circle cx="85" cy="55" r="15" fill="#D97706" />
    <!-- Floating details -->
    <circle cx="45" cy="45" r="2.5" fill="#92400E" />
    <circle cx="30" cy="52" r="2" fill="#92400E" />
    <circle cx="65" cy="45" r="2.5" fill="#92400E" />
  </g>
</svg>